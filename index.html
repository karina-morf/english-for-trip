<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- PWA meta-tags для iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>English AI Coach</title>
  <style>
    /* Базові стилі, щоб додаток виглядав акуратно */
    body { font-family: -apple-system, sans-serif; background: #f4f4f9; margin: 0; display: flex; flex-direction: column; height: 100vh; }
    .screen { padding: 20px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
    #chat-screen { display: none; }
    h1 { text-align: center; color: #333; }
    input, button { padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; outline: none; }
    button { background: #1c1c1e; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:active { background: #3a3a3c; }
    
    /* Стилі чату */
    #chat-box { flex: 1; overflow-y: auto; background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #e5e5ea; display: flex; flex-direction: column; gap: 10px;}
    .message { padding: 12px; border-radius: 16px; max-width: 85%; line-height: 1.4; }
    .user-msg { background: #007aff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .ai-msg { background: #e5e5ea; color: black; align-self: flex-start; border-bottom-left-radius: 4px; }
    
    /* Елементи керування */
    .controls { display: flex; gap: 8px; align-items: center; }
    .controls input { flex: 1; margin: 0; }
    .mic-btn { background: #ff3b30; width: 48px; height: 48px; border-radius: 50%; margin: 0; display: flex; justify-content: center; align-items: center; font-size: 20px;}
    .mic-btn.recording { background: #cce5ff; border: 2px solid #ff3b30; }
  </style>
</head>
<body>

  <!-- Екран логіну -->
  <div id="login-screen" class="screen">
    <h1>AI English Coach</h1>
    <p style="text-align:center; color:#666;">Введіть дані для входу</p>
    <input type="text" id="username" placeholder="Username (як в таблиці)">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Увійти</button>
    <p id="login-error" style="color: red; text-align: center; font-weight: bold;"></p>
  </div>

  <!-- Екран чату -->
  <div id="chat-screen" class="screen">
    <h2 style="margin-top:0; text-align:center;">Coach 🇩🇰</h2>
    <div id="chat-box"></div>
    <div class="controls">
      <button id="mic-btn" class="mic-btn" onclick="startDictation()">🎤</button>
      <input type="text" id="user-input" placeholder="Напишіть щось..." onkeypress="if(event.key === 'Enter') sendMessage()">
      <button onclick="sendMessage()" style="margin:0; padding: 0 15px;">➤</button>
    </div>
  </div>

  <script>
    // СЮДИ ВСТАВ СВІЙ URL ВІД GOOGLE APPS SCRIPT
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx3buWZzKZ4cEmhUKXZltP_NrE_nSkYSbZLZ1pDTSvbbmSUAaQ3NCjmGBw56SWY8YJDAA/exec';
    let currentUser = '';

    // Функція логіну
    async function login() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('login-error');
      
      if (!u || !p) { errorMsg.innerText = 'Заповніть всі поля'; return; }
      errorMsg.innerText = 'Перевірка...';

      try {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          // Використовуємо text/plain, щоб уникнути блокування CORS
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'login', username: u, password: p }),
          redirect: 'follow'
        });
        
        const data = await res.json();

        if (data.success) {
          currentUser = u;
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('chat-screen').style.display = 'flex';
          addMessage('AI', "Hello! Ready to conquer Copenhagen and understand every word from The Neighbourhood? Let's practice!");
        } else {
          errorMsg.innerText = data.error;
        }
      } catch (e) {
        errorMsg.innerText = 'Помилка з\'єднання. Перевір консоль.';
        console.error(e);
      }
    }

    // Функція відправки повідомлення
    async function sendMessage() {
      const input = document.getElementById('user-input');
      const msg = input.value.trim();
      if (!msg) return;

      addMessage('User', msg);
      input.value = ''; // очищаємо поле

      try {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'chat', username: currentUser, message: msg }),
          redirect: 'follow'
        });
        
        const data = await res.json();

        if (data.success) {
          addMessage('AI', data.ai_response);
          speak(data.ai_response); // Запускаємо озвучку
        } else {
          addMessage('AI', 'System error: ' + data.error);
        }
      } catch (e) {
        addMessage('AI', 'Network error.');
        console.error(e);
      }
    }

    // Додавання повідомлення в інтерфейс
    function addMessage(sender, text) {
      const box = document.getElementById('chat-box');
      const div = document.createElement('div');
      div.className = 'message ' + (sender === 'User' ? 'user-msg' : 'ai-msg');
      div.innerText = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight; // Скролимо донизу
    }

    // Голосове введення (Web Speech API)
    function startDictation() {
      const micBtn = document.getElementById('mic-btn');
      if (window.SpeechRecognition || window.webkitSpeechRecognition) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.lang = 'en-US'; // Мова розпізнавання
        recognition.interimResults = false;

        recognition.onstart = function() {
          micBtn.classList.add('recording');
        };

        recognition.onresult = function(e) {
          document.getElementById('user-input').value = e.results[0][0].transcript;
          micBtn.classList.remove('recording');
        };

        recognition.onerror = function(e) {
          alert('Помилка мікрофона: ' + e.error);
          micBtn.classList.remove('recording');
        };
        
        recognition.onend = function() {
          micBtn.classList.remove('recording');
        }

        recognition.start();
      } else {
        alert('На жаль, ваш браузер не підтримує запис голосу.');
      }
    }

    // Озвучування тексту (SpeechSynthesis)
    function speak(text) {
      if ('speechSynthesis' in window) {
        // Очищаємо текст від Markdown-зірочок, щоб синтезатор не читав їх як "asterisk"
        const cleanText = text.replace(/\*/g, ''); 
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'en-GB'; // Британський або американський акцент (en-US)
        utterance.rate = 0.95; // Трохи повільніше для навчання
        window.speechSynthesis.speak(utterance);
      }
    }
  </script>
</body>
</html>
